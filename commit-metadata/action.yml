name: Commit metadata
description: Fetch Git metadata for the current SHA
outputs:
  sha-short:
    description: Short Git SHA
    value: ${{ steps.git.outputs.sha-short }}
  commit-message:
    description: Current commit message
    value: ${{ steps.git.outputs.commit-message }}
runs:
  using: composite
  steps:
    - shell: bash
      id: git
      run: |
        echo "sha-short=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT
        echo "commit-message=$(
          git log --format=%B -n 1 ${{ github.sha }} | head -n 1
        )" >> $GITHUB_OUTPUT
    - shell: bash
      run: |
        cat <<EOF
        Set outputs:
        - sha-short => ${STEPS_GIT_OUTPUTS_SHA_SHORT}
        - commit-message => ${STEPS_GIT_OUTPUTS_COMMIT_MESSAGE}
        EOF
      env:
        STEPS_GIT_OUTPUTS_SHA_SHORT: ${{ steps.git.outputs.sha-short }}
        STEPS_GIT_OUTPUTS_COMMIT_MESSAGE: ${{ steps.git.outputs.commit-message }}
